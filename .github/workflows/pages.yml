name: Deploy site

# Builds the static site (tools/build_site.py) from catalog.json + committed .svg
# previews and deploys it to GitHub Pages. No TeX needed for the site build.
"on":
  push:
    branches: [main]
    paths:
      - "catalog.json"
      - "icons/**"
      - "templates/**"
      - "examples/**"
      - "tools/build_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build site
        run: python3 tools/build_site.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
