<svg xmlns="http://www.w3.org/2000/svg" width="560" height="150" viewBox="0 0 560 150" role="img" aria-label="OpenTikZ">
  <title>OpenTikZ</title>
  <defs>
    <style>
      @font-face{
        font-family:'FrauncesEmbedded';
        font-weight:900;
        font-style:normal;
        src:url(data:font/woff2;base64,) format('woff2');
      }
      .wm{font-family:'FrauncesEmbedded','Fraunces',Georgia,'Times New Roman',serif;
          font-weight:900;font-size:62px;letter-spacing:-1.6px}
    </style>
  </defs>
  <!-- paper-white tile so the wordmark reads on both light and dark READMEs (mirrors the site) -->
  <rect x="1" y="1" width="558" height="148" rx="18" fill="#FBFAF6" stroke="#E6E3D8" stroke-width="1.5"/>
  <text class="wm" x="144.2" y="82" text-anchor="start"><tspan fill="#1B1A16">Open</tspan><tspan fill="#0072B2">TikZ</tspan></text>
  <!-- caret: Fraunces has no box-drawing glyph, so the blinking bar is drawn as a rect (mirrors the site caret) -->
  <rect x="410.3" y="38.6" width="5.5" height="43.4" rx="1" fill="#E69F00"/>
  <text x="280" y="118" text-anchor="middle"
        font-family="'IBM Plex Sans',-apple-system,Segoe UI,Helvetica,Arial,sans-serif"
        font-size="16.5" letter-spacing="0.2" fill="#6F6C61">Paper-ready TikZ figures for academic papers</text>
</svg>
